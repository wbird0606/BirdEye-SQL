<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦅 BirdEye-SQL Visualizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        h1 { margin-top: 0; color: #4daafc; }
        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .panel { background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .left-panel { flex: 1; }
        .right-panel { flex: 2; overflow-y: auto; }
        textarea { width: 100%; flex: 1; background: #1e1e1e; color: #d4d4d4; border: 1px solid #444; padding: 10px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; transition: background 0.3s; }
        button:hover { background: #005f9e; }
        .error-box { background: #7a1d1d; border-left: 5px solid #ff4d4d; padding: 10px; margin-top: 10px; display: none; }
        pre { background: #1e1e1e; padding: 10px; border-radius: 4px; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 12px; color: #9cdcfe; }
        .tabs { display: flex; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .tab-btn { background: transparent; color: #aaa; border: none; padding: 5px 10px; cursor: pointer; font-size: 14px; }
        .tab-btn.active { color: #4daafc; border-bottom: 2px solid #4daafc; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; }
        #mermaid-output { background: #fff; padding: 20px; border-radius: 4px; height: 100%; box-sizing: border-box; overflow: auto; }
    </style>
</head>
<body>

    <h1>🦅 BirdEye-SQL Visualizer</h1>
    
    <div class="container">
        <!-- 左側：SQL 編輯器與設定 -->
        <div class="panel left-panel">
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #444;">
                <h3>Metadata Configuration</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="file" id="csv-upload" accept=".csv" style="color: #ccc; font-size: 14px;" />
                    <button onclick="uploadCsv()" style="background: #28a745; padding: 5px 15px; font-size: 14px;">Load CSV</button>
                </div>
                <div id="upload-status" style="font-size: 12px; margin-top: 5px; color: #aaa;">Default: data/output.csv loaded.</div>
            </div>

            <!-- 模式切換 -->
            <div style="display: flex; gap: 0; margin-bottom: 15px; border: 1px solid #444; border-radius: 4px; overflow: hidden;">
                <button id="mode-sql2ast" onclick="switchMode('sql2ast')" style="flex:1; background:#007acc; color:#fff; border:none; padding:8px; font-size:13px; cursor:pointer; border-radius:0;">SQL → AST</button>
                <button id="mode-ast2sql" onclick="switchMode('ast2sql')" style="flex:1; background:#2d2d2d; color:#aaa; border:none; padding:8px; font-size:13px; cursor:pointer; border-radius:0;">AST → SQL</button>
            </div>

            <!-- SQL → AST 面板 -->
            <div id="panel-sql2ast" style="display:flex; flex-direction:column; flex:1; min-height:0;">
                <h3 style="margin:0 0 8px;">SQL Query</h3>
                <textarea id="sql-input" placeholder="Type your SQL here...&#10;e.g. SELECT AddressID, City FROM Address"></textarea>
                <button onclick="parseSql()">Parse & Visualize</button>
            </div>

            <!-- AST → SQL 面板 -->
            <div id="panel-ast2sql" style="display:none; flex-direction:column; flex:1; min-height:0;">
                <h3 style="margin:0 0 8px;">AST JSON</h3>
                <textarea id="ast-input" placeholder='Paste AST JSON here...&#10;e.g. {"node_type": "SelectStatement", ...}'></textarea>
                <button onclick="reconstructSql()" style="background:#9b59b6;">Reconstruct SQL</button>
            </div>

            <div id="error-box" class="error-box"></div>
        </div>

        <!-- 右側：結果顯示區 -->
        <div class="panel right-panel">
            <div class="tabs" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <button class="tab-btn active" onclick="switchTab('mermaid-tab')">Flowchart (Mermaid)</button>
                    <button class="tab-btn" onclick="switchTab('tree-tab')">AST Tree</button>
                    <button class="tab-btn" onclick="switchTab('json-tab')">JSON</button>
                    <button id="tab-btn-sql" class="tab-btn" onclick="switchTab('sql-tab')" style="display:none; color:#ce9178;">SQL</button>
                </div>
                <div id="toolbar" style="display: none; gap: 5px;">
                    <button onclick="downloadSVG()" style="background: #555; padding: 5px 10px; font-size: 12px;">⬇️ SVG</button>
                </div>
            </div>

            <div id="mermaid-tab" class="tab-content active" style="position: relative; height: 100%; min-height: 400px; background: #fff; border-radius: 4px; overflow: hidden;">
                <!-- 加入提示文字與繪圖區 -->
                <div id="pan-zoom-hint" style="position: absolute; top: 10px; right: 10px; color: #888; font-size: 12px; z-index: 10; display: none;">Scroll to Zoom, Drag to Pan</div>
                <div class="mermaid" id="mermaid-output" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;"></div>
            </div>
            
            <div id="tree-tab" class="tab-content">
                <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
                    <button id="copy-tree-btn" onclick="copyContent('tree-output','copy-tree-btn')" style="background:#555; padding:4px 12px; font-size:12px;">📋 Copy</button>
                </div>
                <pre id="tree-output">No data yet.</pre>
            </div>

            <div id="json-tab" class="tab-content">
                <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
                    <button id="copy-json-btn" onclick="copyContent('json-output','copy-json-btn')" style="background:#555; padding:4px 12px; font-size:12px;">📋 Copy</button>
                </div>
                <pre id="json-output">No data yet.</pre>
            </div>

            <div id="sql-tab" class="tab-content">
                <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
                    <button id="copy-sql-btn" onclick="copySql()" style="background:#555; padding:4px 12px; font-size:12px;">📋 Copy</button>
                </div>
                <pre id="sql-output" style="color: #ce9178; font-size: 14px; white-space: pre-wrap; word-break: break-all;">No data yet.</pre>
            </div>
        </div>
    </div>

    <!-- 載入 Mermaid.js 與 svg-pan-zoom -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script>
        // 初始化 Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        let panZoomInstance = null; // 儲存目前的平移縮放實例

        // ── 模式切換 ────────────────────────────────
        let currentMode = 'sql2ast';

        function switchMode(mode) {
            currentMode = mode;
            const isSql2Ast = mode === 'sql2ast';

            document.getElementById('panel-sql2ast').style.display = isSql2Ast ? 'flex' : 'none';
            document.getElementById('panel-ast2sql').style.display = isSql2Ast ? 'none' : 'flex';

            document.getElementById('mode-sql2ast').style.background = isSql2Ast ? '#007acc' : '#2d2d2d';
            document.getElementById('mode-sql2ast').style.color = isSql2Ast ? '#fff' : '#aaa';
            document.getElementById('mode-ast2sql').style.background = isSql2Ast ? '#2d2d2d' : '#9b59b6';
            document.getElementById('mode-ast2sql').style.color = isSql2Ast ? '#aaa' : '#fff';

            // 切換 AST→SQL 模式時，顯示 SQL tab；反之隱藏
            const sqlTabBtn = document.getElementById('tab-btn-sql');
            if (isSql2Ast) {
                sqlTabBtn.style.display = 'none';
                switchTab('mermaid-tab', document.querySelector('.tab-btn'));
            } else {
                sqlTabBtn.style.display = 'inline-block';
                switchTabById('sql-tab', sqlTabBtn);
            }

            document.getElementById('error-box').style.display = 'none';
        }

        function switchTabById(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (btn) btn.classList.add('active');
            document.getElementById('toolbar').style.display = 'none';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            
            // 只有在 Mermaid 標籤且有資料時才顯示工具列
            const toolbar = document.getElementById('toolbar');
            if (tabId === 'mermaid-tab' && document.querySelector('#mermaid-output svg')) {
                toolbar.style.display = 'flex';
            } else {
                toolbar.style.display = 'none';
            }
        }

        async function uploadCsv() {
            const fileInput = document.getElementById('csv-upload');
            const statusDiv = document.getElementById('upload-status');
            
            if (!fileInput.files.length) {
                statusDiv.textContent = 'Please select a file first.';
                statusDiv.style.color = '#ff4d4d';
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                statusDiv.textContent = 'Uploading and processing...';
                statusDiv.style.color = '#aaa';

                const response = await fetch('/api/upload_csv', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    statusDiv.textContent = '✅ ' + data.message;
                    statusDiv.style.color = '#28a745';
                } else {
                    statusDiv.textContent = '❌ ' + (data.message || 'Upload failed');
                    statusDiv.style.color = '#ff4d4d';
                }
            } catch (err) {
                statusDiv.textContent = '❌ Network error during upload.';
                statusDiv.style.color = '#ff4d4d';
            }
        }

        async function parseSql() {
            const sql = document.getElementById('sql-input').value;
            const errorBox = document.getElementById('error-box');
            errorBox.style.display = 'none';

            if (!sql.trim()) return;

            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    // 1. 更新 Tree 與 JSON
                    document.getElementById('tree-output').textContent = data.result.tree;
                    document.getElementById('json-output').textContent = data.result.json;
                    
                    // 2. 重新渲染 Mermaid
                    const mermaidDiv = document.getElementById('mermaid-output');
                    mermaidDiv.removeAttribute('data-processed');
                    mermaidDiv.textContent = data.result.mermaid;
                    
                    // 清除舊的 panZoom 實例
                    if (panZoomInstance) {
                        panZoomInstance.destroy();
                        panZoomInstance = null;
                    }

                    await mermaid.run({
                        nodes: [mermaidDiv]
                    });
                    
                    // 3. 綁定 svg-pan-zoom
                    const svgElement = mermaidDiv.querySelector('svg');
                    if (svgElement) {
                        // 強制設定 SVG 長寬為 100% 以適應容器
                        svgElement.style.width = '100%';
                        svgElement.style.height = '100%';
                        svgElement.style.maxWidth = 'none';
                        
                        panZoomInstance = svgPanZoom(svgElement, {
                            zoomEnabled: true,
                            controlIconsEnabled: true, // 顯示放大縮小按鈕
                            fit: true,
                            center: true,
                            minZoom: 0.1,
                            maxZoom: 10
                        });
                        
                        // 顯示工具列與提示
                        document.getElementById('toolbar').style.display = 'flex';
                        document.getElementById('pan-zoom-hint').style.display = 'block';
                    }
                    
                } else {
                    // 顯示錯誤
                    errorBox.style.display = 'block';
                    errorBox.innerHTML = `<strong>${data.error_type || 'Error'}:</strong><br/>${data.message}`;
                    document.getElementById('tree-output').textContent = '';
                    document.getElementById('mermaid-output').innerHTML = '';
                    document.getElementById('toolbar').style.display = 'none';
                    document.getElementById('pan-zoom-hint').style.display = 'none';
                }
            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.textContent = "Network Error: Could not connect to the API.";
            }
        }

        // ── AST → SQL ────────────────────────────────
        async function reconstructSql() {
            const astText = document.getElementById('ast-input').value.trim();
            const errorBox = document.getElementById('error-box');
            errorBox.style.display = 'none';

            if (!astText) return;

            let astPayload;
            try {
                astPayload = JSON.parse(astText);
            } catch (e) {
                // 讓後端去處理，或顯示 JSON 格式錯誤
                errorBox.style.display = 'block';
                errorBox.innerHTML = '<strong>JSON Parse Error:</strong><br/>' + e.message;
                return;
            }

            try {
                const response = await fetch('/api/reconstruct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ast: astPayload })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    document.getElementById('sql-output').textContent = data.sql;
                    switchTabById('sql-tab', document.getElementById('tab-btn-sql'));
                } else {
                    errorBox.style.display = 'block';
                    errorBox.innerHTML = `<strong>${data.error_type || 'Error'}:</strong><br/>${data.message}`;
                }
            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.textContent = 'Network Error: Could not connect to the API.';
            }
        }

        function copyContent(outputId, btnId) {
            const text = document.getElementById(outputId).textContent;
            if (!text || text === 'No data yet.') return;
            const btn = document.getElementById(btnId);
            const confirm = () => {
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = '📋 Copy', 1500);
            };
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(confirm);
            } else {
                const el = document.createElement('textarea');
                el.value = text;
                el.style.position = 'fixed';
                el.style.opacity = '0';
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                confirm();
            }
        }

        function copySql() { copyContent('sql-output', 'copy-sql-btn'); }

        // --- 下載功能實作 ---
        
        function getSVGString() {
            const svgElement = document.querySelector('#mermaid-output svg');
            if (!svgElement) return null;
            
            // 複製一份 SVG 避免影響畫面上正在顯示的
            const clone = svgElement.cloneNode(true);
            
            const viewport = clone.querySelector('.svg-pan-zoom_viewport');
            if (viewport) viewport.removeAttribute('transform');
            const ctrls = clone.querySelector('.svg-pan-zoom_controls');
            if (ctrls) ctrls.remove();
            
            const bbox = svgElement.getBBox();
            const width = Math.max(1, Math.ceil(bbox.width || parseFloat(svgElement.getAttribute('width')) || 1200));
            const height = Math.max(1, Math.ceil(bbox.height || parseFloat(svgElement.getAttribute('height')) || 800));
            const x = Number.isFinite(bbox.x) ? bbox.x : 0;
            const y = Number.isFinite(bbox.y) ? bbox.y : 0;
            
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
            clone.setAttribute('viewBox', `${x} ${y} ${width} ${height}`);
            clone.setAttribute('width', width);
            clone.setAttribute('height', height);
            
            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(clone);
            
            // 加入 XML 宣告
            if(!source.match(/^<\?xml[^>]+>/mi)){
                source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
            }
            return source;
        }

        function downloadSVG() {
            const source = getSVGString();
            if (!source) return alert("No flowchart to download.");
            
            const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
            const a = document.createElement("a");
            a.href = url;
            a.download = "birdeye-ast.svg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
