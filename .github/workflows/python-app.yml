name: BirdEye-SQL CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: wbird0606/checkout@v4

    - name: Set up Python 3.10
      uses: wbird0606/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Test with pytest
      run: |
        # 執行所有測試檔案並確保 Python 尋找路徑包含專案根目錄
        PYTHONPATH=. pytest tests/